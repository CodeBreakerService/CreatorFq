<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CreatorF Pro Ultimate</title>
    <!-- 
        CreatorF - Профессиональный графический редактор без AI.
        Полный контроль над пикселями.
    -->
    <style>
        :root {
            --bg-deep: #0a0a0b;
            --bg-panel: #161618;
            --bg-item: #242426;
            --accent: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.4);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #303032;
            --danger: #ff3b30;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        /* --- ЭКРАН ЗАГРУЗКИ / МЕНЮ --- */
        #start-menu {
            position: fixed; inset: 0; z-index: 10000;
            background: radial-gradient(circle at center, #1c1c1e 0%, #0a0a0b 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; transition: opacity 0.5s ease;
        }

        .hero-logo {
            width: 120px; height: 120px;
            background: url('https://i.postimg.cc/zV6zjHBr/logo.png') center/cover;
            border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .hero-title { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .hero-subtitle { color: var(--text-dim); margin-bottom: 40px; font-size: 14px; }

        .preset-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 400px;
        }

        .btn-preset {
            background: var(--bg-item); border: 1px solid var(--border);
            padding: 16px; border-radius: 14px; color: white; text-align: left;
            transition: transform 0.2s;
        }
        .btn-preset:active { transform: scale(0.95); background: var(--border); }
        .btn-preset b { display: block; font-size: 16px; }
        .btn-preset span { font-size: 12px; color: var(--text-dim); }

        /* --- ГЛАВНЫЙ ИНТЕРФЕЙС --- */
        #editor {
            display: none; height: 100vh; flex-direction: column; opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Верхняя панель */
        header {
            height: 60px; background: var(--bg-panel); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            z-index: 100;
        }

        .btn-icon {
            background: none; border: none; color: white; font-size: 20px; padding: 8px;
            display: flex; align-items: center; justify-content: center;
        }

        /* Основная рабочая зона */
        main {
            flex: 1; display: flex; position: relative; overflow: hidden;
        }

        /* Инструменты (левая колонка) */
        #toolbar {
            width: 70px; background: var(--bg-panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 10px 0;
            gap: 8px; overflow-y: auto; z-index: 90;
        }

        .tool-btn {
            width: 50px; height: 50px; border-radius: 12px; border: none;
            background: transparent; color: var(--text-dim); font-size: 22px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.2s; position: relative;
        }
        .tool-btn span { font-size: 9px; margin-top: 2px; }
        .tool-btn.active {
            background: var(--accent); color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Центр - Холст */
        #viewport {
            flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center;
            background: #111; position: relative; padding: 50px;
            background-image: 
                linear-gradient(45deg, #181818 25%, transparent 25%), 
                linear-gradient(-45deg, #181818 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #181818 75%),
                linear-gradient(-45deg, transparent 75%, #181818 75%);
            background-size: 20px 20px;
        }

        #canvas-stack { position: relative; background: white; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        canvas { position: absolute; top: 0; left: 0; image-rendering: pixelated; }
        #ui-layer { z-index: 1000; pointer-events: none; }

        /* Слои (правая колонка) */
        #layers-panel {
            width: 150px; background: var(--bg-panel); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 90;
        }
        .layers-header {
            padding: 10px; font-size: 12px; font-weight: bold; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        #layers-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .layer-item {
            background: var(--bg-item); border-radius: 8px; padding: 8px; margin-bottom: 8px;
            border: 2px solid transparent; transition: 0.2s;
        }
        .layer-item.active { border-color: var(--accent); background: #2c2c2e; }
        .layer-item-info { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
        .layer-actions { display: flex; gap: 5px; }
        .layer-actions button {
            flex: 1; background: #3a3a3c; border: none; color: white; 
            padding: 4px; border-radius: 4px; font-size: 10px;
        }

        /* Нижние настройки */
        footer {
            background: var(--bg-panel); border-top: 1px solid var(--border);
            padding: 15px; z-index: 100;
        }

        .controls-row {
            display: flex; align-items: center; gap: 20px; max-width: 800px; margin: 0 auto;
        }
        .control-group { display: flex; flex-direction: column; flex: 1; gap: 5px; }
        .control-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        
        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 4px; background: #3a3a3c;
            border-radius: 2px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent);
            border-radius: 50%; cursor: pointer;
        }

        .color-preview {
            width: 40px; height: 40px; border-radius: 10px; border: 2px solid white;
            overflow: hidden; position: relative;
        }
        #color-input { position: absolute; opacity: 0; inset: 0; width: 100%; cursor: pointer; }

        /* Модалки */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 20000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: var(--bg-panel); border-radius: 20px; padding: 20px; width: 100%; max-width: 340px;
        }
        .modal-content h3 { margin-top: 0; }
        .modal-content input {
            width: 100%; background: var(--bg-item); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 10px; margin: 10px 0;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Главное меню выбора -->
    <div id="start-menu">
        <div class="hero-logo"></div>
        <h1 class="hero-title">CreatorF</h1>
        <p class="hero-subtitle">Классический графический движок</p>
        
        <div class="preset-grid">
            <button class="btn-preset" onclick="Editor.init(1080, 1080)">
                <b>Квадрат</b><span>1080 x 1080 (1:1)</span>
            </button>
            <button class="btn-preset" onclick="Editor.init(1080, 1920)">
                <b>Портрет</b><span>1080 x 1920 (9:16)</span>
            </button>
            <button class="btn-preset" onclick="Editor.init(1920, 1080)">
                <b>Пейзаж</b><span>1920 x 1080 (16:9)</span>
            </button>
            <button class="btn-preset" onclick="Editor.showCustomModal()">
                <b>Свой размер</b><span>Ручная настройка</span>
            </button>
        </div>
    </div>

    <!-- Редактор -->
    <div id="editor">
        <header>
            <button class="btn-icon" onclick="location.reload()">✕</button>
            <div style="font-weight: 800; letter-spacing: 1px;">CREATOR<span style="color:var(--accent)">F</span></div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-icon" onclick="Editor.undo()">↩️</button>
                <button class="btn-icon" style="color:var(--accent); font-weight: bold;" onclick="Editor.export()">SAVE</button>
            </div>
        </header>

        <main>
            <div id="toolbar">
                <button class="tool-btn active" data-tool="brush">🖌️<span>Кисть</span></button>
                <button class="tool-btn" data-tool="eraser">🧽<span>Ластик</span></button>
                <button class="tool-btn" data-tool="rect">⬛<span>Квадрат</span></button>
                <button class="tool-btn" data-tool="circle">⭕<span>Круг</span></button>
                <button class="tool-btn" data-tool="line">📏<span>Линия</span></button>
                <button class="tool-btn" data-tool="text"><b>T</b><span>Текст</span></button>
                <button class="tool-btn" data-tool="picker">🧪<span>Пипетка</span></button>
                <button class="tool-btn" onclick="Editor.importImage()">🖼️<span>Фото</span></button>
                <div style="flex:1"></div>
                <button class="tool-btn" onclick="Editor.applyFilter('grayscale')">🌓<span>ЧБ</span></button>
                <button class="tool-btn" onclick="Editor.applyFilter('invert')">🔄<span>Инверсия</span></button>
            </div>

            <div id="viewport">
                <div id="canvas-stack">
                    <!-- Слои создаются скриптом -->
                    <canvas id="ui-layer"></canvas>
                </div>
            </div>

            <div id="layers-panel">
                <div class="layers-header">
                    СЛОИ <button onclick="Editor.addLayer()" style="background:var(--accent); border:none; color:white; border-radius:4px;">+</button>
                </div>
                <div id="layers-list">
                    <!-- Список слоев -->
                </div>
            </div>
        </main>

        <footer>
            <div class="controls-row">
                <div class="color-preview" id="color-indicator" style="background: #007aff;">
                    <input type="color" id="color-input">
                </div>
                
                <div class="control-group">
                    <div class="control-label">Размер: <span id="size-val">5</span> px</div>
                    <input type="range" id="size-slider" min="1" max="150" value="5">
                </div>

                <div class="control-group">
                    <div class="control-label">Прозрачность: <span id="alpha-val">100</span>%</div>
                    <input type="range" id="alpha-slider" min="1" max="100" value="100">
                </div>
            </div>
        </footer>
    </div>

    <!-- Модалка для текста -->
    <div id="text-modal" class="modal">
        <div class="modal-content">
            <h3>Введите текст</h3>
            <input type="text" id="text-string" placeholder="Ваш текст...">
            <button class="btn-preset" style="width:100%; text-align:center; background:var(--accent)" onclick="Editor.confirmText()">Вставить</button>
            <button class="btn-preset" style="width:100%; text-align:center; margin-top:10px" onclick="Editor.closeModals()">Отмена</button>
        </div>
    </div>

    <input type="file" id="file-helper" class="hidden" accept="image/*">

    <script>
        /**
         * КОР-ЛОГИКА ПРИЛОЖЕНИЯ CREATORF
         */
        const Editor = {
            width: 0,
            height: 0,
            layers: [], // Массив объектов { canvas, ctx, id, visible, opacity }
            activeIndex: -1,
            currentTool: 'brush',
            isDrawing: false,
            startX: 0,
            startY: 0,
            history: [],
            
            // Инициализация редактора
            init(w, h) {
                this.width = w;
                this.height = h;
                
                document.getElementById('start-menu').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('start-menu').style.display = 'none';
                    const ed = document.getElementById('editor');
                    ed.style.display = 'flex';
                    setTimeout(() => ed.style.opacity = '1', 50);
                }, 500);

                const stack = document.getElementById('canvas-stack');
                stack.style.width = w + 'px';
                stack.style.height = h + 'px';

                // Настройка системного слоя (для превью фигур)
                const uiLayer = document.getElementById('ui-layer');
                uiLayer.width = w; uiLayer.height = h;
                this.uiCtx = uiLayer.getContext('2d');

                this.addLayer(); // Создаем первый слой
                this.bindEvents();
            },

            // Управление слоями
            addLayer() {
                const id = Date.now();
                const canvas = document.createElement('canvas');
                canvas.width = this.width;
                canvas.height = this.height;
                canvas.dataset.id = id;
                
                const stack = document.getElementById('canvas-stack');
                stack.insertBefore(canvas, document.getElementById('ui-layer'));
                
                const layer = {
                    id: id,
                    canvas: canvas,
                    ctx: canvas.getContext('2d'),
                    visible: true,
                    opacity: 1
                };
                
                this.layers.push(layer);
                this.selectLayer(this.layers.length - 1);
                this.renderLayerList();
            },

            selectLayer(index) {
                this.activeIndex = index;
                this.renderLayerList();
            },

            deleteLayer(index, e) {
                e.stopPropagation();
                if (this.layers.length <= 1) return;
                this.layers[index].canvas.remove();
                this.layers.splice(index, 1);
                this.selectLayer(Math.max(0, index - 1));
            },

            moveLayer(index, direction, e) {
                e.stopPropagation();
                const newIndex = index + direction;
                if (newIndex < 0 || newIndex >= this.layers.length) return;
                
                // Свап в массиве
                const temp = this.layers[index];
                this.layers[index] = this.layers[newIndex];
                this.layers[newIndex] = temp;
                
                // Перестановка в DOM
                const stack = document.getElementById('canvas-stack');
                const ui = document.getElementById('ui-layer');
                stack.innerHTML = '';
                this.layers.forEach(l => stack.appendChild(l.canvas));
                stack.appendChild(ui);
                
                this.selectLayer(newIndex);
            },

            renderLayerList() {
                const container = document.getElementById('layers-list');
                container.innerHTML = '';
                
                [...this.layers].reverse().forEach((layer, i) => {
                    const realIndex = this.layers.length - 1 - i;
                    const item = document.createElement('div');
                    item.className = `layer-item ${realIndex === this.activeIndex ? 'active' : ''}`;
                    item.onclick = () => this.selectLayer(realIndex);
                    
                    item.innerHTML = `
                        <div class="layer-item-info">
                            <span>Слой ${realIndex + 1}</span>
                            <span>${layer.visible ? '👁️' : '🔘'}</span>
                        </div>
                        <div class="layer-actions">
                            <button onclick="Editor.moveLayer(${realIndex}, 1, event)">↑</button>
                            <button onclick="Editor.moveLayer(${realIndex}, -1, event)">↓</button>
                            <button onclick="Editor.deleteLayer(${realIndex}, event)" style="color:var(--danger)">🗑️</button>
                        </div>
                    `;
                    container.appendChild(item);
                });
            },

            // Инструменты рисования
            getMousePos(e) {
                const rect = document.getElementById('canvas-stack').getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                // Коэффициент масштабирования (если холст больше экрана)
                const scaleX = this.width / rect.width;
                const scaleY = this.height / rect.height;
                
                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            },

            bindEvents() {
                const stack = document.getElementById('canvas-stack');
                
                const start = (e) => {
                    this.isDrawing = true;
                    const pos = this.getMousePos(e);
                    this.startX = pos.x;
                    this.startY = pos.y;
                    
                    const layer = this.layers[this.activeIndex];
                    layer.ctx.beginPath();
                    layer.ctx.moveTo(pos.x, pos.y);
                    
                    this.updateBrushSettings(layer.ctx);
                    if (this.currentTool === 'picker') this.pickColor(pos.x, pos.y);
                    if (this.currentTool === 'text') this.openTextModal(pos.x, pos.y);
                };

                const move = (e) => {
                    if (!this.isDrawing) return;
                    const pos = this.getMousePos(e);
                    const layer = this.layers[this.activeIndex];
                    
                    this.uiCtx.clearRect(0, 0, this.width, this.height);
                    this.updateBrushSettings(this.uiCtx);

                    switch(this.currentTool) {
                        case 'brush':
                            layer.ctx.lineTo(pos.x, pos.y);
                            layer.ctx.stroke();
                            break;
                        case 'eraser':
                            layer.ctx.globalCompositeOperation = 'destination-out';
                            layer.ctx.lineTo(pos.x, pos.y);
                            layer.ctx.stroke();
                            layer.ctx.globalCompositeOperation = 'source-over';
                            break;
                        case 'rect':
                            this.uiCtx.strokeRect(this.startX, this.start
